<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasher Butt - Warehouse Operations & Logistics Specialist</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #2563eb;
            --accent: #3b82f6;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.7;
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero / Header Section */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .header-content {
            flex: 1;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Profile Image Styles */
        .profile-img-container {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-placeholder {
            font-size: 4rem;
            color: #94a3b8;
        }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .contact-bar a, .contact-bar span {
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .contact-bar a:hover {
            color: var(--accent);
        }

        .cta-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--secondary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: #cbd5e1;
            border: 2px solid #475569;
        }

        .btn-outline:hover {
            border-color: white;
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Layout Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 868px) {
            header {
                flex-direction: column-reverse;
                text-align: center;
                padding: 40px 20px;
            }
            .contact-bar {
                justify-content: center;
            }
            .cta-group {
                justify-content: center;
            }
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        section {
            background: var(--bg-card);
            padding: 35px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            margin-bottom: 30px;
        }

        section h2 {
            font-size: 1.45rem;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        section h2 i {
            color: var(--secondary);
        }

        /* Timeline / Jobs */
        .timeline-item {
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .role-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
        }

        .company-name {
            color: var(--secondary);
            font-weight: 600;
            font-size: 1rem;
        }

        .job-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .job-bullets {
            list-style: none;
        }

        .job-bullets li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .job-bullets li::before {
            content: "→";
            color: var(--secondary);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* Enhanced Skills Categorization */
        .skill-category {
            margin-bottom: 20px;
        }

        .skill-category h3 {
            font-size: 0.95rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skills-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            background: #eff6ff;
            color: var(--secondary);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #dbeafe;
        }

        .badge-tech {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #dcfce7;
        }

        /* Cover Letter Styling */
        .cover-letter-box {
            background: #f8fafc;
            border: 1px dashed var(--border);
            padding: 25px;
            border-radius: 8px;
            font-size: 0.95rem;
            white-space: pre-line;
            color: #334155;
        }

        /* Contact Form / Get In Touch */
        .form-control {
            margin-bottom: 15px;
        }

        .form-control label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .form-control input, .form-control textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fafafa;
        }

        .form-control input:focus, .form-control textarea:focus {
            outline: none;
            border-color: var(--secondary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>
